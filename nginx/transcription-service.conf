# Transcription Service — host-level nginx reverse proxy
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/
# Adjust server_name to your domain

upstream transcription_frontend {
    server 127.0.0.1:3000;
}

upstream transcription_flower {
    server 127.0.0.1:5555;
}

server {
    listen 80;
    server_name transcription.likesoftio.com;  # TODO: replace with actual domain

    client_max_body_size 2100M;

    # Frontend + API (nginx in Docker handles /api/ proxy to backend)
    location / {
        proxy_pass http://transcription_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large file upload timeouts
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }

    # Flower monitoring (optional, restrict in production)
    location /flower/ {
        proxy_pass http://transcription_flower/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Basic auth recommended for production
        # auth_basic "Flower Monitoring";
        # auth_basic_user_file /etc/nginx/.htpasswd_flower;
    }
}
